<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arachne Engine Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            color: #64ffda;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .subtitle {
            color: #888;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        #arachne-canvas {
            border: 1px solid #333;
            border-radius: 4px;
            background: #000;
            cursor: crosshair;
        }

        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        button {
            background: #16213e;
            color: #64ffda;
            border: 1px solid #64ffda;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #1a3a5c;
        }

        button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .info {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #666;
            max-width: 800px;
            text-align: center;
        }

        #status {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #aaa;
        }

        #error {
            margin-top: 1rem;
            padding: 1rem;
            background: #2a1a1a;
            border: 1px solid #ff4444;
            border-radius: 4px;
            color: #ff6666;
            display: none;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>Arachne Engine</h1>
    <p class="subtitle">Sub-1MB Embeddable Interactive Runtime</p>

    <canvas id="arachne-canvas" width="800" height="600"></canvas>

    <div class="controls">
        <button id="btn-spawn">Spawn Entity</button>
        <button id="btn-fullscreen">Fullscreen</button>
    </div>

    <div id="status">Status: loading...</div>
    <div id="error"></div>

    <div class="info">
        <p>
            Click <strong>Spawn Entity</strong> to add objects.
            Use WASD / arrow keys to interact. Click canvas to spawn physics bodies.
        </p>
    </div>

    <script type="module">
        import init, { run } from './pkg/arachne_wasm.js';

        const canvas = document.getElementById('arachne-canvas');
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const btnFullscreen = document.getElementById('btn-fullscreen');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            statusEl.textContent = 'Status: error';
        }

        // Check for WebGPU support.
        if (!navigator.gpu) {
            showError(
                'WebGPU is not supported in this browser. ' +
                'Please use Chrome 113+, Edge 113+, or Safari 18+.'
            );
        } else {
            async function main() {
                statusEl.textContent = 'Status: loading WASM...';
                await init();

                statusEl.textContent = 'Status: initializing engine...';

                // Boot the full engine with GPU rendering on the canvas.
                // This creates the App, WasmRunner, WebGPU surface, and
                // enters the requestAnimationFrame loop.
                run('arachne-canvas');

                statusEl.textContent = 'Status: running';

                btnFullscreen.addEventListener('click', () => {
                    if (canvas.requestFullscreen) {
                        canvas.requestFullscreen();
                    }
                });
            }

            main().catch((err) => {
                console.error(err);
                showError(`Failed to start: ${err.message || err}`);
            });
        }
    </script>
</body>
</html>
