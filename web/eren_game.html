<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eren's World - Arachne Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
        }

        h1 {
            color: #64ffda;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #555;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        .canvas-wrapper {
            position: relative;
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 4px 24px rgba(100, 255, 218, 0.06);
        }

        #arachne-canvas {
            display: block;
            max-width: 100%;
            height: auto;
            cursor: default;
        }

        .controls {
            margin-top: 0.8rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .controls kbd {
            background: #16213e;
            color: #64ffda;
            border: 1px solid #1a3a5c;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.75rem;
            font-family: monospace;
        }

        .controls span {
            color: #555;
            font-size: 0.75rem;
        }

        button {
            background: #16213e;
            color: #64ffda;
            border: 1px solid #64ffda33;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #1a3a5c;
        }

        #status {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #444;
        }

        #error {
            margin-top: 1rem;
            padding: 1rem;
            background: #1a0a0a;
            border: 1px solid #ff4444;
            border-radius: 4px;
            color: #ff6666;
            display: none;
            max-width: 600px;
            font-size: 0.85rem;
        }

        .badge {
            margin-top: 0.8rem;
            font-size: 0.65rem;
            color: #333;
        }

        .badge a {
            color: #64ffda44;
            text-decoration: none;
        }

        .badge a:hover {
            color: #64ffda;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Eren's World</h1>
        <p class="subtitle">A tile-based adventure powered by Arachne Engine</p>
    </div>

    <div class="canvas-wrapper">
        <canvas id="arachne-canvas" width="640" height="480"></canvas>
    </div>

    <div class="controls">
        <kbd>WASD</kbd> <span>Move</span>
        <kbd>E</kbd> <span>Interact</span>
        <button id="btn-fullscreen">Fullscreen</button>
    </div>

    <div id="status">Loading...</div>
    <div id="error"></div>

    <div class="badge">
        Built with <a href="https://github.com/eren23/arachne">Arachne Engine</a> &mdash; sub-1MB, runs in your browser
    </div>

    <script type="module">
        import init, { run_eren_game } from './pkg/arachne_wasm.js';

        const canvas = document.getElementById('arachne-canvas');
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const btnFullscreen = document.getElementById('btn-fullscreen');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            statusEl.textContent = 'Error';
        }

        if (!navigator.gpu) {
            showError(
                'WebGPU is not supported in this browser. ' +
                'Please use Chrome 113+, Edge 113+, or Safari 18+.'
            );
        } else {
            async function main() {
                statusEl.textContent = 'Loading WASM...';
                await init();

                statusEl.textContent = 'Starting engine...';
                run_eren_game('arachne-canvas');

                statusEl.textContent = '';

                btnFullscreen.addEventListener('click', () => {
                    if (canvas.requestFullscreen) {
                        canvas.requestFullscreen();
                    }
                });

                // Prevent arrow keys from scrolling the page
                window.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                        e.preventDefault();
                    }
                });
            }

            main().catch((err) => {
                console.error(err);
                showError(`Failed to start: ${err.message || err}`);
            });
        }
    </script>
</body>
</html>
